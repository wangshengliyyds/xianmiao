<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闲妙 - 离线</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: #10b981;
    }
    p { margin-top: 1rem; color: #666; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">闲妙</div>
    <p>网络连接不可用，请检查网络后重试</p>
    <button onclick="location.reload()">重新加载</button>
  </div>
</body>
</html>
