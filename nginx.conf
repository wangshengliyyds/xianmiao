# Nginx 配置 - 闲妙
# 将此文件放到 /etc/nginx/conf.d/xianmiao.conf

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # 替换为你的域名

    # SSL 证书（推荐用 certbot 获取免费证书）
    # 安装 certbot: apt install certbot python3-certbot-nginx
    # 获取证书: certbot --nginx -d your-domain.com
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 静态文件缓存
    location /_next/static/ {
        alias /opt/xianmiao/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # 图片缓存
    location /icons/ {
        alias /opt/xianmiao/public/icons/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # PWA 文件
    location /sw.js {
        alias /opt/xianmiao/public/sw.js;
        add_header Cache-Control "no-cache";
    }

    location /manifest.json {
        alias /opt/xianmiao/public/manifest.json;
        add_header Cache-Control "no-cache";
    }

    # 反向代理到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # WebSocket 支持（Realtime）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 上传文件大小限制
    client_max_body_size 10M;
}
