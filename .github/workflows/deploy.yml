name: xianmiao项目云端自动部署
on:
  push:
    branches: [ master ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取master分支最新代码
        uses: actions/checkout@v4

      - name: 配置Node.js 20环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖并云端构建
        run: |
          npm install
          npm run build

      - name: 上传文件到阿里云服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "./*"
          target: "/www/wwwroot/xianmiao"
          overwrite: true

      - name: 部署后重启项目服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /www/wwwroot/xianmiao
            npm install
            pm2 restart xianmiao || pm2 start npm --name "xianmiao" -- start
